    <meta name="robots" content="noindex">
    <!--
      This page is served for EVERY unmatched URL on the domain, so the path is
      whatever a visitor, a stale link or a crawler asked for — e.g. a mistyped
      legacy link of the shape /john-smith-total-loss-4471. That path must not
      leak to third parties. Two controls:
        1. this referrer policy, so the requested path is not put in a Referer
           header sent to unpkg / fonts / Turnstile / Google / any other origin;
        2. data-page="404" below, which makes analytics.js report a CONSTANT
           page_location for this page instead of the requested path.
      Removing either one re-opens a PII channel that no parameter allowlist
      can see, because the leak is in the URL rather than in an event parameter.
    -->
